# ═══════════════════════════════════════════════
# TowBook → Supabase Keys Sync
#
# Fills the `keys` column for any impound where it is currently NULL.
# Runs daily and processes up to 75 records per run.
#
# Completely isolated from sync-towbook.yml — a failure here has zero
# impact on the primary impound sync.
#
# No additional secrets required — reuses the same four already set:
#   TOWBOOK_USER         — TowBook login username
#   TOWBOOK_PASS         — TowBook login password
#   SUPABASE_URL         — from Supabase Dashboard → Settings → API
#   SUPABASE_SERVICE_KEY — service role key (NOT the anon key)
# ═══════════════════════════════════════════════

name: Sync TowBook Keys

on:
  schedule:
    - cron: '0 14 * * *'   # daily at 2 PM UTC (10 AM ET) — offset from main sync
  workflow_dispatch:         # allow manual trigger from Actions tab

jobs:
  sync-keys:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/impounds/requirements.txt

      - name: Install Python dependencies
        run: pip install -r apps/impounds/requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('apps/impounds/requirements.txt') }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Install Playwright browsers and system deps
        run: python -m playwright install chromium --with-deps

      - name: Run keys sync
        env:
          TOWBOOK_USER:         ${{ secrets.TOWBOOK_USER }}
          TOWBOOK_PASS:         ${{ secrets.TOWBOOK_PASS }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python apps/impounds/scripts/sync_keys.py

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keys-debug-screenshots
          path: "keys_debug_*.png"
          if-no-files-found: ignore
