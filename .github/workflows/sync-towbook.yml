# ═══════════════════════════════════════════════
# TowBook → Supabase Impound Sync
#
# Runs every 4 hours automatically, or on-demand via:
#   - GitHub Actions "Run workflow" button
#   - The "Sync Towbook" button in the Impound Tracker app
#     (calls POST /api/sync-towbook which dispatches this workflow)
#
# Required repository secrets (Settings → Secrets → Actions):
#   TOWBOOK_USER         — TowBook login username
#   TOWBOOK_PASS         — TowBook login password
#   SUPABASE_URL         — from Supabase Dashboard → Settings → API
#   SUPABASE_SERVICE_KEY — service role key (bypasses RLS) — NOT the anon key
# ═══════════════════════════════════════════════

name: Sync TowBook Impounds

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours
  workflow_dispatch:          # allow manual trigger (Actions tab + API)

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/impounds/requirements.txt

      - name: Install Python dependencies
        run: pip install -r apps/impounds/requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('apps/impounds/requirements.txt') }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Install Playwright browsers and system deps
        run: python -m playwright install chromium --with-deps

      - name: Run impound sync
        env:
          TOWBOOK_USER:        ${{ secrets.TOWBOOK_USER }}
          TOWBOOK_PASS:        ${{ secrets.TOWBOOK_PASS }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python apps/impounds/scripts/sync_impounds.py

      - name: Upload debug screenshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: login-debug-screenshot
          path: login_debug.png
          if-no-files-found: ignore
